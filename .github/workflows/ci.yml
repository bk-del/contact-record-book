name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Detect test script
        id: tests
        run: |
          node -e "const pkg=require('./package.json');const testScript=(pkg.scripts&&pkg.scripts.test)||'';const hasTests=Boolean(testScript)&&!/^echo\\s+[\"']Error: no test specified/.test(testScript);process.stdout.write('has_tests=' + (hasTests ? 'true' : 'false') + '\n');" >> "$GITHUB_OUTPUT"

      - name: Test
        if: steps.tests.outputs.has_tests == 'true'
        run: npm test
